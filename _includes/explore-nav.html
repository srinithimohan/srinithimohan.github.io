<aside class="explore-panel">
  <p class="eyebrow">explore</p>
  <nav class="file-nav">
    {% for item in site.data.navigation %}
      <a class="file-item {% if page.url == item.link %}current{% endif %}" href="{{ item.link | relative_url }}">
        {% include folder-icon.html %}
        <span class="file-label">{{ item.name }}</span>
      </a>
    {% endfor %}
  </nav>
</aside>
