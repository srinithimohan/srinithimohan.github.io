<header class="dock-bar">
  <a class="dock-home" href="{{ '/index.html' | relative_url }}">Srinithi Mohan</a>
  <nav class="dock-nav">
    {% for item in site.data.navigation %}
      {% unless item.link == '/index.html' %}
        <a class="dock-item {% if page.url == item.link %}current{% endif %}" href="{{ item.link | relative_url }}">
          {% include folder-icon.html %}
          <span>{{ item.name }}</span>
        </a>
      {% endunless %}
    {% endfor %}
  </nav>
</header>
